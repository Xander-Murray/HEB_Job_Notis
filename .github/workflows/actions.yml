name: run main.py

on:
  schedule:
    - cron: "0 23 * * *" # 23:00 UTC = 17:00 CST (UTC-6)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: execute py script
        env:
          EMAIL_ID: ${{ secrets.EMAIL_ID }}
          EMAIL_PWORD: ${{ secrets.EMAIL_PWORD }}
          JOB_LIMIT: ${{ vars.JOB_LIMIT }}
          JOB_PAGE_START: ${{ vars.JOB_PAGE_START }}
        run: python main.py
